name: AgriShield Automated Testing

on:
  push:
    branches: [ "main" ]

jobs:
  test-models:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
      
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        
    - name: Generate Mock Models for Cloud Test
      run: |
        mkdir -p models
        touch models/plant_disease_model.keras
        touch models/yield_model.pkl
        
    - name: Execute Pytest Suite
      run: |
        pytest
